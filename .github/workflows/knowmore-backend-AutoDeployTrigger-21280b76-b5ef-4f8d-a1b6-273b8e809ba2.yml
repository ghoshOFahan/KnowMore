name: Trigger auto deployment for knowmore-backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.KNOWMOREBACKEND_REGISTRY_USERNAME }}
          password: ${{ secrets.KNOWMOREBACKEND_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            aintlucifer/knowmore-backend:latest
            aintlucifer/knowmore-backend:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.KNOWMOREBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.KNOWMOREBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.KNOWMOREBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name knowmore-backend \
              --resource-group KnowMore \
              --image aintlucifer/knowmore-backend:${{ github.sha }}
