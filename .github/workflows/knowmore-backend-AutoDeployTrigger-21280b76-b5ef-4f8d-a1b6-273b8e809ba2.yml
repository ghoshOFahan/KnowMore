name: Trigger auto deployment for knowmore-backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.KNOWMOREBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.KNOWMOREBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.KNOWMOREBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          dockerfilePath: Dockerfile
          registryUrl: docker.io
          registryUsername: ${{ secrets.KNOWMOREBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.KNOWMOREBACKEND_REGISTRY_PASSWORD }}
          containerAppName: knowmore-backend
          resourceGroup: KnowMore
          imageToBuild: aintlucifer/knowmore-backend:${{ github.sha }}
          imageToDeploy: aintlucifer/knowmore-backend:${{ github.sha }}
